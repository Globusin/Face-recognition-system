<!DOCTYPE html>
<html>
<head>
    <title>Smart Door Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Адаптивный дизайн */
    </style>
</head>
<body>
    <div class="container">
        <h1>Smart Door Control Panel</h1>
        
        <div class="section">
            <h2>Add New User</h2>
            <button onclick="addUser()">Add User</button>
            <div id="preview"></div>
        </div>
    </div>
    
    <script>
        function addUser() {            
            fetch('/api/add_user', {method: 'POST'}).then(response => response.json())
              .then(data => alert('User added successfully'));
        }
    </script>
</body>
</html>
